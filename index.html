<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="訪問スケジュール管理">
<title>訪問スケジュール管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;
  background: #f5f5f3; color: #1a1a1a; min-height: 100vh;
  padding-bottom: 40px;
}
.wrap { max-width: 480px; margin: 0 auto; padding: 16px; }

/* ヘッダー */
.header {
  display: flex; align-items: center; justify-content: space-between;
  background: #1a1a1a; color: #fff; padding: 14px 16px;
  position: sticky; top: 0; z-index: 100;
}
.header-title { font-size: 16px; font-weight: 600; }
.header-right { font-size: 12px; color: #aaa; }

/* 統計バー */
.stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 12px 0;
}
.stat-card {
  background: #fff; border-radius: 12px; border: 1px solid #e8e8e6;
  padding: 12px 8px; text-align: center;
}
.stat-label { font-size: 10px; color: #888; margin-bottom: 4px; }
.stat-num   { font-size: 24px; font-weight: 700; color: #1a1a1a; }
.stat-unit  { font-size: 10px; color: #bbb; }

/* タブ */
.tabs {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 12px;
}
.tab-btn {
  padding: 10px 4px; font-size: 13px; font-weight: 600;
  background: #f5f5f3; color: #888; border: none; border-radius: 10px; cursor: pointer;
  transition: background 0.15s;
}
.tab-btn.active { background: #1a1a1a; color: #fff; }

/* カード */
.card {
  background: #fff; border-radius: 14px; border: 1px solid #e8e8e6;
  padding: 16px; margin-bottom: 10px;
}
.card-label { font-size: 12px; color: #888; margin-bottom: 8px; }

/* 訪問カード */
.visit-card {
  background: #fff; border-radius: 14px; border: 1px solid #e8e8e6;
  padding: 16px; margin-bottom: 10px; transition: border-color 0.15s;
}
.visit-card.visited { border-left: 4px solid #27ae60; }
.visit-card.unvisited { border-left: 4px solid #e8e8e6; }
.visit-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.visit-datetime { font-size: 12px; color: #888; margin-bottom: 2px; }
.visit-name { font-size: 16px; font-weight: 600; color: #1a1a1a; }
.status-badge {
  font-size: 11px; font-weight: 600; border-radius: 20px; padding: 4px 10px; cursor: pointer;
  border: 1px solid; white-space: nowrap;
}
.status-badge.unvisited { color: #888; border-color: #ddd; background: none; }
.status-badge.visited   { color: #27ae60; border-color: #27ae60; background: none; }
.visit-info { font-size: 13px; color: #555; margin-bottom: 3px; line-height: 1.5; }
.visit-memo { font-size: 13px; color: #888; margin-bottom: 8px; line-height: 1.5; }
.visit-photo { width: 100%; border-radius: 8px; object-fit: cover; max-height: 180px; margin-bottom: 8px; }
.visit-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-map  { flex:1; padding:8px; font-size:12px; font-weight:600; background:#4285F4; color:#fff; border:none; border-radius:8px; cursor:pointer; }
.btn-edit { flex:1; padding:8px; font-size:12px; font-weight:600; background:#f5f5f3; color:#1a1a1a; border:1px solid #ddd; border-radius:8px; cursor:pointer; }
.btn-del  { flex:1; padding:8px; font-size:12px; font-weight:600; background:#fff0f0; color:#c0392b; border:1px solid #f5c6cb; border-radius:8px; cursor:pointer; }

/* フォーム */
.form-screen { display: none; }
.form-header {
  display: flex; align-items: center; justify-content: space-between;
  background: #1a1a1a; color: #fff; padding: 14px 16px;
  position: sticky; top: 0; z-index: 100; margin-bottom: 12px;
}
.form-title { font-size: 16px; font-weight: 600; }
.btn-back { font-size: 13px; color: #aaa; background: none; border: none; cursor: pointer; padding: 4px 8px; }
.form-input {
  width: 100%; padding: 11px 12px; font-size: 15px;
  border: 1px solid #ddd; border-radius: 10px; outline: none;
  background: #fafafa; color: #1a1a1a; transition: border-color 0.15s;
}
.form-input:focus { border-color: #1a1a1a; background: #fff; }
textarea.form-input { resize: none; line-height: 1.6; }

/* ステータスボタン */
.status-btns { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
.status-btn {
  padding: 12px; font-size: 14px; font-weight: 600;
  border-radius: 10px; cursor: pointer; border: 1px solid #ddd; transition: all 0.15s;
}
.status-btn.active-unvisit { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.status-btn.active-visit   { background: #27ae60; color: #fff; border-color: #27ae60; }
.status-btn.inactive       { background: #f5f5f3; color: #888; }

/* 共通ボタン */
.btn-primary {
  width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
  background: #1a1a1a; color: #fff; border: none; border-radius: 12px;
  cursor: pointer; letter-spacing: 0.03em; margin-bottom: 12px;
}
.btn-add {
  width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
  background: #27ae60; color: #fff; border: none; border-radius: 12px;
  cursor: pointer; letter-spacing: 0.03em; margin-bottom: 12px;
}
.btn-map-full {
  width: 100%; padding: 11px; font-size: 13px; font-weight: 600;
  background: #4285F4; color: #fff; border: none; border-radius: 10px; cursor: pointer; margin-top: 8px;
}
.error-msg { font-size: 12px; color: #c0392b; text-align: center; min-height: 18px; margin-bottom: 8px; }
.empty-msg { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }

/* PWA追加ヒント */
.pwa-hint {
  background: #fff; border-radius: 12px; border: 1px solid #e8e8e6;
  padding: 12px 14px; margin-bottom: 12px; font-size: 12px; color: #888; line-height: 1.6;
}
.pwa-hint strong { color: #1a1a1a; }
</style>
</head>
<body>

<!-- メイン画面 -->
<div id="main-screen">
  <div class="header">
    <span class="header-title">📋 訪問予定管理</span>
    <span class="header-right" id="header-date"></span>
  </div>
  <div class="wrap">
    <div id="pwa-hint" class="pwa-hint" style="display:none;">
      <strong>💡 ホーム画面に追加すると便利です</strong><br>
      iPhone: 下部の共有ボタン → 「ホーム画面に追加」<br>
      Android: メニュー → 「ホーム画面に追加」
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;">
      <div class="stat-card">
        <p class="stat-label">今日</p>
        <p class="stat-num" id="count-today">0</p>
        <p class="stat-unit">件</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">今週</p>
        <p class="stat-num" id="count-week">0</p>
        <p class="stat-unit">件</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">今月</p>
        <p class="stat-num" id="count-month">0</p>
        <p class="stat-unit">件</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">累計</p>
        <p class="stat-num" id="count-total">0</p>
        <p class="stat-unit">件</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;">
      <button class="tab-btn active" id="tab-today"   onclick="switchTab('today')">今日</button>
      <button class="tab-btn"        id="tab-week"    onclick="switchTab('week')">今週</button>
      <button class="tab-btn"        id="tab-month"   onclick="switchTab('month')">今月</button>
      <button class="tab-btn"        id="tab-history" onclick="switchTab('history')">履歴</button>
    </div>
    <div id="visit-list"></div>
    <button class="btn-add" onclick="openForm()">＋ 新規登録</button>
  </div>
</div>

<!-- フォーム画面 -->
<div id="form-screen" class="form-screen">
  <div class="form-header">
    <button class="btn-back" onclick="closeForm()">← 戻る</button>
    <span class="form-title" id="form-title">新規登録</span>
    <span style="width:48px;"></span>
  </div>
  <div class="wrap">
    <div class="card">
      <p class="card-label">訪問日時 *</p>
      <input type="datetime-local" id="f-datetime" class="form-input" />
    </div>
    <div class="card">
      <p class="card-label">お客様名 *</p>
      <input type="text" id="f-name" class="form-input" placeholder="例：株式会社〇〇" />
    </div>
    <div class="card">
      <p class="card-label">住所</p>
      <input type="text" id="f-address" class="form-input" placeholder="例：福岡県福岡市博多区〇〇" />
      <button class="btn-map-full" onclick="openMapFromInput()">Googleマップで確認</button>
    </div>
    <div class="card">
      <p class="card-label">電話番号</p>
      <input type="tel" id="f-tel" class="form-input" placeholder="例：090-XXXX-XXXX" />
    </div>
    <div class="card">
      <p class="card-label">メモ</p>
      <textarea id="f-memo" class="form-input" rows="3" placeholder="例：契約書持参"></textarea>
    </div>
    <div class="card">
      <p class="card-label">写真</p>
      <input type="file" id="f-photo" accept="image/*" capture="environment"
        style="font-size:13px;color:#555;width:100%;padding:4px 0;" />
      <img id="f-photo-preview" src="" alt=""
        style="display:none;width:100%;border-radius:10px;margin-top:8px;object-fit:cover;max-height:200px;" />
    </div>
    <div class="card">
      <p class="card-label">ステータス</p>
      <div class="status-btns">
        <button id="sbtn-0" class="status-btn active-unvisit" onclick="selectStatus(0)">□ 未訪問</button>
        <button id="sbtn-1" class="status-btn inactive"       onclick="selectStatus(1)">✓ 訪問済</button>
      </div>
    </div>
    <p class="error-msg" id="form-error"></p>
    <button class="btn-primary" onclick="saveVisit()">保存する</button>
  </div>
</div>

<script>
// ========== データ管理 ==========
const STORAGE_KEY = 'dorakuru_visits';
let visits = [];
let editingId = null;
let currentTab = 'today';
let selectedStatus = 0;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    visits = raw ? JSON.parse(raw) : [];
  } catch(e) { visits = []; }
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(visits)); } catch(e) {}
}

// ========== 画面切替 ==========
function showMain() {
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('form-screen').style.display = 'none';
  window.scrollTo(0, 0);
}
function showForm() {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('form-screen').style.display = 'block';
  window.scrollTo(0, 0);
}

// ========== フォーム ==========
function openForm(id) {
  editingId = id !== undefined ? id : null;
  const visit = editingId !== null ? visits.find(v => v.id === editingId) : null;
  document.getElementById('form-title').textContent = visit ? '編集' : '新規登録';

  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const defaultDt = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + 'T' + pad(now.getHours()) + ':00';

  document.getElementById('f-datetime').value = visit ? visit.datetime : defaultDt;
  document.getElementById('f-name').value      = visit ? visit.name    : '';
  document.getElementById('f-address').value   = visit ? visit.address : '';
  document.getElementById('f-tel').value       = visit ? visit.tel     : '';
  document.getElementById('f-memo').value      = visit ? visit.memo    : '';
  document.getElementById('form-error').textContent = '';
  document.getElementById('f-photo').value = '';

  const preview = document.getElementById('f-photo-preview');
  if (visit && visit.photo) {
    preview.src = visit.photo; preview.style.display = 'block';
  } else {
    preview.src = ''; preview.style.display = 'none';
  }
  selectStatus(visit ? visit.status : 0);
  showForm();
}

function closeForm() {
  renderList();
  updateCounts();
  showMain();
}

function openMapFromInput() {
  const addr = document.getElementById('f-address').value.trim();
  if (!addr) { alert('住所を入力してください。'); return; }
  window.open('https://www.google.com/maps/search/' + encodeURIComponent(addr), '_blank');
}

function selectStatus(s) {
  selectedStatus = s;
  document.getElementById('sbtn-0').className = 'status-btn ' + (s === 0 ? 'active-unvisit' : 'inactive');
  document.getElementById('sbtn-1').className = 'status-btn ' + (s === 1 ? 'active-visit'   : 'inactive');
}

document.getElementById('f-photo').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const preview = document.getElementById('f-photo-preview');
    // 画像をリサイズして容量を抑える
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const data = canvas.toDataURL('image/jpeg', 0.7);
      preview.src = data; preview.style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

function saveVisit() {
  const datetime = document.getElementById('f-datetime').value;
  const name     = document.getElementById('f-name').value.trim();
  const address  = document.getElementById('f-address').value.trim();
  const tel      = document.getElementById('f-tel').value.trim();
  const memo     = document.getElementById('f-memo').value.trim();
  const preview  = document.getElementById('f-photo-preview');
  const photo    = preview.style.display !== 'none' ? preview.src : null;

  if (!datetime || !name) {
    document.getElementById('form-error').textContent = '訪問日時とお客様名は必須です。';
    return;
  }

  const managedId = editingId !== null ? editingId : Date.now();
  const managedNo = editingId !== null
    ? (visits.find(v => v.id === editingId) || {}).no
    : visits.length + 1;

  const record = { id: managedId, no: managedNo, datetime, name, address, tel, memo, status: selectedStatus, photo };

  if (editingId !== null) {
    const idx = visits.findIndex(v => v.id === editingId);
    if (idx >= 0) visits[idx] = record;
  } else {
    visits.push(record);
  }
  saveData();
  closeForm();
}

// ========== 削除 ==========
function deleteVisit(id) {
  if (!confirm('この予定を削除しますか？')) return;
  visits = visits.filter(v => v.id !== id);
  saveData();
  renderList();
  updateCounts();
}

// ========== ステータス切替 ==========
function toggleStatus(id) {
  const v = visits.find(v => v.id === id);
  if (v) { v.status = v.status === 0 ? 1 : 0; saveData(); renderList(); updateCounts(); }
}

// ========== タブ切替 ==========
function switchTab(tab) {
  currentTab = tab;
  ['today','week','month','history'].forEach(t => {
    document.getElementById('tab-' + t).className = 'tab-btn' + (t === tab ? ' active' : '');
  });
  renderList();
}

// ========== 日付ヘルパー ==========
function getDateStr(dt) { return dt ? dt.split('T')[0] : ''; }
function getWeekRange() {
  const now = new Date();
  const ws  = new Date(now); ws.setDate(now.getDate() - now.getDay());
  const we  = new Date(now); we.setDate(now.getDate() + (6 - now.getDay()));
  return { wsStr: ws.toISOString().split('T')[0], weStr: we.toISOString().split('T')[0] };
}

// ========== リスト描画 ==========
function renderList() {
  const today = new Date().toISOString().split('T')[0];
  const { wsStr, weStr } = getWeekRange();

  const now2   = new Date();
  const monthStr = now2.getFullYear() + '-' + String(now2.getMonth()+1).padStart(2,'0');
  let filtered = visits.filter(v => {
    const d = getDateStr(v.datetime);
    if (currentTab === 'today')   return d === today;
    if (currentTab === 'week')    return d >= wsStr && d <= weStr;
    if (currentTab === 'month')   return d.startsWith(monthStr);
    if (currentTab === 'history') return v.status === 1;
    return true;
  });
  filtered.sort((a,b) => a.datetime.localeCompare(b.datetime));

  const list = document.getElementById('visit-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-msg">予定はありません</div>';
    return;
  }

  list.innerHTML = filtered.map(v => {
    const dtDisp = v.datetime.replace('T',' ').substring(0,16);
    const isVisited = v.status === 1;
    const addrEnc = encodeURIComponent(v.address || '');
    return `<div class="visit-card ${isVisited ? 'visited' : 'unvisited'}">
      <div class="visit-head">
        <div>
          <p class="visit-datetime">📅 ${dtDisp}　No.${v.no || ''}</p>
          <p class="visit-name">${v.name}</p>
        </div>
        <button class="status-badge ${isVisited ? 'visited' : 'unvisited'}" onclick="toggleStatus(${v.id})">
          ${isVisited ? '✓ 訪問済' : '□ 未訪問'}
        </button>
      </div>
      ${v.address ? `<p class="visit-info">📍 ${v.address}</p>` : ''}
      ${v.tel     ? `<p class="visit-info">📞 <a href="tel:${v.tel}" style="color:#1a1a1a;text-decoration:none;">${v.tel}</a></p>` : ''}
      ${v.memo    ? `<p class="visit-memo">📝 ${v.memo}</p>` : ''}
      ${v.photo   ? `<img src="${v.photo}" class="visit-photo" />` : ''}
      <div class="visit-actions">
        ${v.address ? `<button class="btn-map" onclick="window.open('https://www.google.com/maps/search/${addrEnc}','_blank')">マップ</button>` : ''}
        <button class="btn-edit" onclick="openForm(${v.id})">編集</button>
        <button class="btn-del"  onclick="deleteVisit(${v.id})">削除</button>
      </div>
    </div>`;
  }).join('');
}

// ========== 統計更新 ==========
function updateCounts() {
  const today = new Date().toISOString().split('T')[0];
  const { wsStr, weStr } = getWeekRange();
  const now3 = new Date();
  const mStr = now3.getFullYear() + '-' + String(now3.getMonth()+1).padStart(2,'0');
  document.getElementById('count-today').textContent = visits.filter(v => getDateStr(v.datetime) === today).length;
  document.getElementById('count-week').textContent  = visits.filter(v => { const d = getDateStr(v.datetime); return d >= wsStr && d <= weStr; }).length;
  document.getElementById('count-month').textContent = visits.filter(v => getDateStr(v.datetime).startsWith(mStr)).length;
  document.getElementById('count-total').textContent = visits.length;
}

// ========== 日付ヘッダー ==========
function updateHeaderDate() {
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  const str = now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate() + '（' + days[now.getDay()] + '）';
  document.getElementById('header-date').textContent = str;
}

// ========== PWAヒント ==========
function checkPWA() {
  const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  if (!isStandalone) {
    const hint = document.getElementById('pwa-hint');
    if (hint) hint.style.display = 'block';
  }
}

// ========== 初期化 ==========
loadData();
updateHeaderDate();
renderList();
updateCounts();
checkPWA();
</script>
</body>
</html>
